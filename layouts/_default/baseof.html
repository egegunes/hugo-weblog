<!DOCTYPE html>
<html lang="{{ site.Language.Lang | default "en" }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  <div class="page">
    {{- partial "header.html" . -}}
    <div class="layout">
      <main class="content">
        {{- block "main" . }}{{ end -}}
      </main>
      {{- partial "sidebar.html" . -}}
    </div>
    {{- partial "footer.html" . -}}
  </div>
</body>
</html>
