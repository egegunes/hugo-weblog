<article class="post post-entry post-full">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <p class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "Monday, 2 January 2006, 15:04" }}</time>
      {{- if .Lastmod.After .Date }}
      &middot; updated <time datetime="{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Lastmod.Format "2 Jan 2006" }}</time>
      {{- end }}
    </p>
  </header>

  <div class="post-body">
    {{ .Content }}
  </div>

  {{ partial "post-tags.html" . }}
</article>
